baseURL = 'https://wolf8334.github.io/'
languageCode = 'zh-cn'
title = '多多的技术沉淀'
theme = 'PaperMod' 

# 性能与SEO优化
enableRobotsTXT = true
buildFuture = false

[params]
    env = "production"
    title = "徐浩然"
    description = "NL2SQL RAG 架构 | 大模型调优 | 技术随笔"
    author = "钱多多"
    
    # 界面功能
    ShowCodeCopyButtons = true # 代码一键复制，面试官最爱
    showReadingTime = true    # 显示阅读时间
    displayFullContent = false
    ShowBreadCrumbs = true    # 显示面包屑导航

    # 首页信息流设置
    [params.homeInfoParams]
        Title = "欢迎来到我的技术边疆"
        Content = "在这里记录RAG、 NL2SQL、MoE 架构以及与大模型斗智斗勇的实战经验。"

    # 社交链接（放你的 GitHub/公众号）
  [[params.socialIcons]]
        name = "github"
        url = "https://github.com/wolf8334"

# 搜索功能开启（PaperMod 特色）
[outputs]
    home = ["HTML", "RSS", "JSON"]